name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Inject Supabase credentials into config.js at build time.
      # Values come from GitHub repository secrets — never committed.
      - name: Inject Supabase config
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          UMAMI_SITE_ID:     ${{ secrets.UMAMI_SITE_ID }}
        run: |
          sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g"      js/config.js
          sed -i "s|__SUPABASE_ANON_KEY__|${SUPABASE_ANON_KEY}|g" js/config.js
          # Uncomment Umami script if ID is provided
          if [ -n "$UMAMI_SITE_ID" ]; then
            sed -i "s|__UMAMI_SITE_ID__|${UMAMI_SITE_ID}|g" index.html
            sed -i 's|<!-- <script defer|<script defer|g'    index.html
            sed -i 's|></script> -->|></script>|g'           index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
